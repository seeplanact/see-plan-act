version: '3.9'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: seeplanact-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - seeplanact-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client/see-plan-act
      dockerfile: Dockerfile
    container_name: seeplanact-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - seeplanact-network

networks:
  seeplanact-network:
    driver: bridge